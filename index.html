<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day 1 Demo | Superhero Name Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-overlay"></div>
  <div class="grid-overlay"></div>

  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">DAY 1 INTERACTIVE DEMO</p>
      <h1>Superhero Name Generator</h1>
      <p class="hero-text">
        Try the finished project first. Then build it yourself in Python.
      </p>
    </section>

    <section class="terminal-card">
      <div class="terminal-topbar">
        <div class="topbar-left">
          <div class="traffic-lights">
            <span class="light red"></span>
            <span class="light amber"></span>
            <span class="light green"></span>
          </div>
          <div class="terminal-badge">WAYNE SYSTEMS</div>
        </div>

        <div class="topbar-right">
          <span class="file-name">main.py</span>
          <span class="status-pill">LIVE DEMO</span>
        </div>
      </div>

      <div class="terminal-body">
        <aside class="line-numbers" id="lineNumbers"></aside>

        <div class="terminal-main">
          <div id="console" class="console-output"></div>

          <div class="terminal-input-wrap">
            <div class="input-shell">
              <div class="input-indicator"></div>
              <input
                id="userInput"
                type="text"
                autocomplete="off"
                spellcheck="false"
                placeholder="Enter your response..."
              />
              <button id="submitBtn" class="enter-btn">Submit</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="action-row">
      <button id="runBtn" class="primary-btn">Run Demo</button>
      <button id="resetBtn" class="secondary-btn">Reset</button>
      <button id="soundBtn" class="tertiary-btn">Sound: Off</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
